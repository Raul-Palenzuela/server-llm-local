<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi asistente local</title>
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#0f1117; color:#e6e6e6; display:flex; flex-direction:column; height:100vh; }
  header { padding:14px 20px; background:#161922; border-bottom:1px solid #2a2e3a; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header p { margin:0; font-size:12px; color:#9aa0ad; }
  #newSessionBtn { padding:6px 14px; border-radius:6px; border:1px solid #2a2e3a; background:transparent; color:#9aa0ad; cursor:pointer; font-size:12px; }
  #newSessionBtn:hover { background:#1d212c; color:#e6e6e6; }
  #uploadBar { display:flex; gap:8px; align-items:center; padding:10px 20px; background:#161922; border-bottom:1px solid #2a2e3a; font-size:13px; }
  #uploadBar input[type=file] { color:#9aa0ad; font-size:12px; }
  #uploadStatus { color:#8ce0a4; font-size:12px; }
  #chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:75%; padding:10px 14px; border-radius:10px; line-height:1.45; white-space:pre-wrap; font-size:14px; }
  .user { align-self:flex-end; background:#2a5bd7; color:white; }
  .assistant { align-self:flex-start; background:#1d212c; border:1px solid #2a2e3a; }
  .sources { font-size:11px; color:#6b7180; margin-top:6px; }
  .meta { font-size:11px; color:#6b7180; margin-top:4px; }
  #inputBar { display:flex; gap:8px; padding:14px 20px; background:#161922; border-top:1px solid #2a2e3a; }
  #inputBar input { flex:1; padding:10px 14px; border-radius:8px; border:1px solid #2a2e3a; background:#0f1117; color:#e6e6e6; font-size:14px; }
  #inputBar button { padding:10px 18px; border-radius:8px; border:none; background:#2a5bd7; color:white; cursor:pointer; font-size:14px; }
  #inputBar button:disabled { background:#3a3f4d; cursor:not-allowed; }
  #status { font-size:12px; color:#9aa0ad; padding:0 20px 10px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Mi asistente local</h1>
    <p id="serverInfo">Conectando...</p>
  </div>
  <button id="newSessionBtn">+ Nueva conversación</button>
</header>

<div id="uploadBar">
  <span>📄 Añadir documento a esta conversación:</span>
  <input id="fileInput" type="file" accept=".txt,.md,.py,.pdf" />
  <span id="uploadStatus"></span>
</div>

<div id="chat"></div>
<div id="status"></div>

<div id="inputBar">
  <input id="userInput" type="text" placeholder="Escribe tu mensaje..." />
  <button id="sendBtn">Enviar</button>
</div>

<script>
const BACKEND = "http://localhost:8002";

// Cada pestaña genera su propio session_id al cargar — completamente aislada
let sessionId = crypto.randomUUID();
let history = [];

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const serverInfoEl = document.getElementById('serverInfo');
const fileInput = document.getElementById('fileInput');
const uploadStatus = document.getElementById('uploadStatus');

function updateSessionInfo() {
  serverInfoEl.textContent = `Sesión: ${sessionId.slice(0, 8)}… (aislada, solo ve sus propios documentos)`;
}
updateSessionInfo();

fetch(`${BACKEND}/health`).then(r => r.json()).then(d => {
  serverInfoEl.textContent = `Sesión: ${sessionId.slice(0, 8)}… · ${d.active_sessions} sesión(es) activa(s) en el servidor`;
}).catch(() => {
  serverInfoEl.textContent = "No se pudo conectar al backend";
});

document.getElementById('newSessionBtn').addEventListener('click', () => {
  if (!confirm("¿Iniciar nueva conversación? Se perderán los documentos subidos en esta sesión.")) return;
  fetch(`${BACKEND}/session/${sessionId}`, { method: 'DELETE' });
  sessionId = crypto.randomUUID();
  history = [];
  chatEl.innerHTML = '';
  uploadStatus.textContent = '';
  updateSessionInfo();
});

function addMessage(role, content, sources) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  if (sources && sources.length > 0) {
    const src = document.createElement('div');
    src.className = 'sources';
    src.textContent = '📎 Fuentes: ' + sources.join(', ');
    div.appendChild(src);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage('user', text);
  history.push({ role: "user", content: text });
  inputEl.value = '';
  sendBtn.disabled = true;
  statusEl.textContent = "Pensando...";

  const start = performance.now();
  try {
    const res = await fetch(`${BACKEND}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: sessionId, history })
    });

    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    history.push({ role: "assistant", content: data.reply });
    const elapsed = ((performance.now() - start) / 1000).toFixed(1);
    addMessage('assistant', data.reply, data.sources);

    const last = chatEl.lastChild;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = elapsed + "s";
    last.appendChild(meta);

    statusEl.textContent = "";
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;

  uploadStatus.textContent = "Indexando...";
  const formData = new FormData();
  formData.append("file", file);
  formData.append("session_id", sessionId);

  try {
    const res = await fetch(`${BACKEND}/upload`, { method: "POST", body: formData });
    const data = await res.json();
    uploadStatus.textContent = data.error
      ? "Error: " + data.error
      : `"${data.filename}" listo (${data.chunks_indexed} fragmentos) — solo visible en esta conversación`;
  } catch (e) {
    uploadStatus.textContent = "Error: " + e.message;
  }
  fileInput.value = '';
});
</script>

</body>
</html>
